name: Claude Code Review

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Only review PRs from external forks. Same-repo PRs are either
    # authored by the maintainer directly or by Claude on their behalf,
    # so a bot review adds no signal. pull_request_target is required
    # to expose secrets for fork PRs; the action reads the diff via
    # the GitHub API, so no fork code executes on the runner.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: '--max-turns 5'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

