name: Build Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'zmNinjaNg-*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Sync version to platform configs
        run: node scripts/sync-version.js

      - name: Build web app
        working-directory: ./app
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./app
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/zmninja-ng-upload.jks

      - name: Build Android APK (release, signed)
        working-directory: ./app/android
        env:
          ZMNINJA_KEYSTORE_PATH: /tmp/zmninja-ng-upload.jks
          ZMNINJA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ZMNINJA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ZMNINJA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Android App Bundle (AAB, release, signed)
        working-directory: ./app/android
        env:
          ZMNINJA_KEYSTORE_PATH: /tmp/zmninja-ng-upload.jks
          ZMNINJA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ZMNINJA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ZMNINJA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/zmninja-ng-upload.jks

      - name: Rename Android artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#zmNinjaNg-}"
          mkdir -p dist/android
          cp app/android/app/build/outputs/apk/release/*.apk dist/android/zmNinjaNg-${VERSION}-android.apk
          cp app/android/app/build/outputs/bundle/release/*.aab dist/android/zmNinjaNg-${VERSION}-android.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNg-android-apk-${{ github.event.inputs.version || github.ref_name }}
          path: dist/android/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNg-android-aab-${{ github.event.inputs.version || github.ref_name }}
          path: dist/android/*.aab
          retention-days: 30

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/zmNinjaNg-')
        with:
          files: |
            dist/android/*.apk
            dist/android/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
