name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: android,macos,linux,windows)'
        required: false
        default: 'android,macos,linux,windows'
        type: string

jobs:
  build-android:
    if: contains(github.event.inputs.platforms, 'android')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build web app
        working-directory: ./app
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./app
        run: npx cap sync android

      - name: Build Android APK (debug, signed)
        working-directory: ./app/android
        run: ./gradlew assembleDebug

      - name: Build Android App Bundle (AAB, debug, signed)
        working-directory: ./app/android
        run: ./gradlew bundleDebug

      - name: Rename Android artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p dist/android
          cp app/android/app/build/outputs/apk/debug/*.apk dist/android/zmNinjaNG-android-debug-${VERSION}.apk
          cp app/android/app/build/outputs/bundle/debug/*.aab dist/android/zmNinjaNG-android-debug-${VERSION}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-android-apk-${{ github.event.inputs.version }}
          path: dist/android/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-android-aab-${{ github.event.inputs.version }}
          path: dist/android/*.aab

  build-macos:
    if: contains(github.event.inputs.platforms, 'macos')
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build Tauri app (macOS)
        working-directory: ./app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-macos-dmg-${{ github.event.inputs.version }}
          path: app/src-tauri/target/release/bundle/dmg/*.dmg

  build-linux-amd64:
    if: contains(github.event.inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build Tauri app (Linux amd64)
        working-directory: ./app
        run: npm run tauri:build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-linux-amd64-appimage-${{ github.event.inputs.version }}
          path: app/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload DEB package artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-linux-amd64-deb-${{ github.event.inputs.version }}
          path: app/src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    if: contains(github.event.inputs.platforms, 'windows')
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build Tauri app (Windows)
        working-directory: ./app
        run: npm run tauri:build

      - name: Upload MSI installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-windows-msi-${{ github.event.inputs.version }}
          path: app/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNG-windows-nsis-${{ github.event.inputs.version }}
          path: app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
