name: Bug report
description: Report a bug in zmNinjaNg
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please read the [self-support guidelines](https://github.com/pliablepixels/zmNinjaNg/blob/main/README.md#agentic-ai-you-and-me). You are free to post issues, but there is no guarantee of a response.

        If you use self-signed certificates, enable the toggle in **Settings > Connection** (mobile) or add your CA to the system trust store (desktop). Proper certificates (e.g. Let's Encrypt) are recommended.

  - type: input
    id: app-version
    attributes:
      label: zmNinjaNg version
      description: Found under the Logs menu option.
      placeholder: e.g. 1.4.2
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - macOS (desktop)
        - Windows (desktop)
        - Linux (desktop)
        - Web browser
    validations:
      required: true

  - type: input
    id: platform-version
    attributes:
      label: OS / browser version
      description: e.g. iOS 17.4, Android 14, macOS 14.5, Chrome 124
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: e.g. iPhone 15 Pro, Pixel 7, MacBook Pro M2
    validations:
      required: false

  - type: input
    id: zm-version
    attributes:
      label: ZoneMinder version
      placeholder: e.g. 1.36.34
    validations:
      required: true

  - type: input
    id: es-version
    attributes:
      label: Event Server (ES) version
      description: |
        `/usr/bin/zmeventnotification.pl --version` — leave blank if not installed.
    validations:
      required: false

  - type: input
    id: zm-detect-version
    attributes:
      label: zm_detect version
      description: |
        `/var/lib/zmeventnotification/bin/zm_detect.py --version` — leave blank if not installed.
    validations:
      required: false

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Drag and drop screenshots, or paste relevant log output.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
